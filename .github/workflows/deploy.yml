name: Deploy Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has_secrets: ${{ steps.check.outputs.has_secrets }}
    steps:
      - name: Check for deploy secrets
        id: check
        run: |
          if [ -n "$SSH_HOST" ] && [ -n "$SSH_KEY" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_KEY: ${{ secrets.SSH_KEY }}

  deploy:
    needs: check-secrets
    if: needs.check-secrets.outputs.has_secrets == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='node_modules/' --exclude='src/' --exclude='.git/' --exclude='.github/' --exclude='scripts/' --exclude='vite.config.js' --exclude='svelte.config.js' --exclude='tailwind.config.js' --exclude='postcss.config.js' --exclude='package.json' --exclude='package-lock.json' --exclude='CLAUDE.md' --exclude='README.md' --exclude='.env' --exclude='.env.*'
          path: ./
          remote_path: ${{ secrets.REMOTE_PATH }}
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_KEY }}
          remote_port: ${{ secrets.SSH_PORT }}

      # REMOTE_PATH points at the theme dir; WP-CLI needs the WP root, so strip
      # everything from /wp-content/ onwards. Both flushes are best-effort:
      # `wp cache flush` clears the object cache; `wp litespeed-purge` clears the
      # LiteSpeed page cache only if that plugin is installed.
      - name: Clear caches
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: REMOTE_PATH
          script: |
            WP_ROOT="${REMOTE_PATH%%/wp-content/*}"
            WP_ROOT="${WP_ROOT/#\~/$HOME}"
            cd "$WP_ROOT" || { echo "Could not cd to WP root ($WP_ROOT) — skipping cache flush."; exit 0; }
            wp cache flush 2>/dev/null && echo "Object cache flushed." || echo "Object cache flush skipped."
            wp litespeed-purge all 2>/dev/null && echo "LiteSpeed cache purged." || echo "LiteSpeed purge skipped (plugin not installed)."
        env:
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
